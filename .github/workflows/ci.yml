name: RUGB CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Check Formatting (all workspace members)
        run: cargo fmt --all -- --check

      - name: Run Clippy — rugb
        run: cargo clippy -p rugb -- -D warnings

      - name: Run Clippy — rugba
        run: cargo clippy -p rugba -- -D warnings

  test:
    name: Run Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests — rugb
        run: cargo test -p rugb --verbose

      - name: Run Tests — rugba
        run: cargo test -p rugba --verbose

      - name: Run WASM Tests — rugb
        run: |
          cargo install wasm-pack
          wasm-pack test rugb --headless --chrome

      - name: Run WASM Tests — rugba
        run: wasm-pack test rugba --headless --chrome

  deploy:
    name: Build & Deploy to GitHub Pages
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack

      - name: Install wasm-pack
        run: command -v wasm-pack || cargo install wasm-pack

      - name: Build WASM Release — rugb
        run: wasm-pack build rugb --target web --out-dir ../web/pkg/rugb --release

      - name: Build WASM Release — rugba
        run: wasm-pack build rugba --target web --out-dir ../web/pkg/rugba --release

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
