<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUGB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating menu button -->
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">&#9776;</button>

    <!-- Side menu -->
    <div id="side-menu" class="side-menu">
        <div class="side-menu-content">
            <h2>RUGB</h2>
            <label class="file-btn menu-item">
                Load ROM
                <input type="file" id="rom-input" accept=".gb,.bin" hidden>
            </label>
            <button id="pause-btn" class="menu-item" disabled>Pause</button>
            <button id="reset-btn" class="menu-item" disabled>Reset</button>
            <button id="mute-btn" class="menu-item" disabled>Mute</button>
            <hr>
            <div class="menu-group">
                <span>Speed</span>
                <div class="menu-row">
                    <button class="speed-btn active" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="2">2x</button>
                    <button class="speed-btn" data-speed="4">4x</button>
                </div>
            </div>
            <div class="menu-group">
                <span>Palette</span>
                <div class="menu-row">
                    <button class="palette-btn" data-palette="green">Green</button>
                    <button class="palette-btn" data-palette="gray">Gray</button>
                    <button class="palette-btn" data-palette="bw">B&W</button>
                </div>
            </div>
            <hr>
            <div class="menu-group">
                <span>Display</span>
                <div class="menu-row">
                    <button id="view-gb" class="view-btn active">Game Boy</button>
                    <button id="view-screen" class="view-btn">Screen Only</button>
                </div>
            </div>
            <hr>
            <button id="savestates-btn" class="menu-item">Save States</button>
            <button id="remap-btn" class="menu-item">Remap Keys</button>
        </div>
    </div>

    <!-- Game Boy shell -->
    <div class="gameboy">
        <!-- Screen bezel -->
        <div class="gb-bezel">
            <div class="gb-screen-label">RUGB</div>
            <div class="gb-screen-frame">
                <canvas id="screen" width="160" height="144"></canvas>
            </div>
        </div>

        <!-- Controls area -->
        <div class="gb-controls">
            <!-- D-pad -->
            <div class="gb-dpad-area">
                <div class="gb-dpad">
                    <div class="dpad-v">
                        <div class="dpad-arm dpad-up gb-input" data-btn="2"></div>
                        <div class="dpad-arm dpad-down gb-input" data-btn="3"></div>
                    </div>
                    <div class="dpad-h">
                        <div class="dpad-arm dpad-left gb-input" data-btn="1"></div>
                        <div class="dpad-arm dpad-right gb-input" data-btn="0"></div>
                    </div>
                    <div class="dpad-center"></div>
                </div>
            </div>

            <!-- A / B buttons -->
            <div class="gb-ab-area">
                <div class="gb-ab">
                    <div class="gb-ab-col">
                        <div class="gb-round-btn gb-input btn-b" data-btn="5"></div>
                        <span class="gb-btn-label">B</span>
                    </div>
                    <div class="gb-ab-col">
                        <div class="gb-round-btn gb-input btn-a" data-btn="4"></div>
                        <span class="gb-btn-label">A</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start / Select -->
        <div class="gb-meta-area">
            <div class="gb-meta-col">
                <div class="gb-pill-btn gb-input btn-select" data-btn="7"></div>
                <span class="gb-meta-label">SELECT</span>
            </div>
            <div class="gb-meta-col">
                <div class="gb-pill-btn gb-input btn-start" data-btn="6"></div>
                <span class="gb-meta-label">START</span>
            </div>
        </div>
    </div>

    <!-- Key remap overlay -->
    <div id="remap-overlay" class="overlay">
        <div class="overlay-content">
            <h2>Remap Keys</h2>
            <table class="remap-table">
                <tr><td>D-pad Right</td><td><button class="remap-btn" data-action="right">ArrowRight</button></td></tr>
                <tr><td>D-pad Left</td><td><button class="remap-btn" data-action="left">ArrowLeft</button></td></tr>
                <tr><td>D-pad Up</td><td><button class="remap-btn" data-action="up">ArrowUp</button></td></tr>
                <tr><td>D-pad Down</td><td><button class="remap-btn" data-action="down">ArrowDown</button></td></tr>
                <tr><td>A</td><td><button class="remap-btn" data-action="a">z</button></td></tr>
                <tr><td>B</td><td><button class="remap-btn" data-action="b">x</button></td></tr>
                <tr><td>Start</td><td><button class="remap-btn" data-action="start">Enter</button></td></tr>
                <tr><td>Select</td><td><button class="remap-btn" data-action="select">Shift</button></td></tr>
                <tr><td>Pause</td><td><button class="remap-btn" data-action="pause">p</button></td></tr>
                <tr><td>Mute</td><td><button class="remap-btn" data-action="mute">m</button></td></tr>
                <tr class="remap-quicksave"><td>Quick Save</td><td><button class="remap-btn" data-action="quicksave">F5</button></td></tr>
                <tr class="remap-quicksave"><td>Quick Load</td><td><button class="remap-btn" data-action="quickload">F8</button></td></tr>
            </table>
            <div class="remap-actions">
                <button id="remap-export">Export</button>
                <button id="remap-import">Import</button>
                <button id="remap-reset">Reset</button>
                <button id="remap-close">Done</button>
                <input type="file" id="remap-file" accept=".json" hidden>
            </div>
        </div>
    </div>

    <!-- Save states overlay -->
    <div id="savestates-overlay" class="overlay">
        <div class="overlay-content savestates-content">
            <h2>Save States</h2>
            <div class="save-slots">
                <div class="save-slot" data-slot="1">
                    <span class="slot-label">Slot 1</span>
                    <span class="slot-info" id="slot-info-1">Empty</span>
                    <button class="slot-save" data-slot="1">Save</button>
                    <button class="slot-load" data-slot="1" disabled>Load</button>
                </div>
                <div class="save-slot" data-slot="2">
                    <span class="slot-label">Slot 2</span>
                    <span class="slot-info" id="slot-info-2">Empty</span>
                    <button class="slot-save" data-slot="2">Save</button>
                    <button class="slot-load" data-slot="2" disabled>Load</button>
                </div>
                <div class="save-slot" data-slot="3">
                    <span class="slot-label">Slot 3</span>
                    <span class="slot-info" id="slot-info-3">Empty</span>
                    <button class="slot-save" data-slot="3">Save</button>
                    <button class="slot-load" data-slot="3" disabled>Load</button>
                </div>
                <div class="save-slot" data-slot="4">
                    <span class="slot-label">Slot 4</span>
                    <span class="slot-info" id="slot-info-4">Empty</span>
                    <button class="slot-save" data-slot="4">Save</button>
                    <button class="slot-load" data-slot="4" disabled>Load</button>
                </div>
                <div class="save-slot" data-slot="5">
                    <span class="slot-label">Slot 5</span>
                    <span class="slot-info" id="slot-info-5">Empty</span>
                    <button class="slot-save" data-slot="5">Save</button>
                    <button class="slot-load" data-slot="5" disabled>Load</button>
                </div>
            </div>
            <div class="remap-actions">
                <button id="savestates-close">Done</button>
            </div>
        </div>
    </div>

    <!-- Quick save/load toast -->
    <div id="toast" class="toast"></div>

    <script type="module" src="js/index.js"></script>
</body>
</html>
